# Local Postgres for the test suite. The production / dev DB is the remote
# alwaysdata managed Postgres (configured in apps/api/.env). This container
# exists purely to remove ~150-500ms-per-query network latency from the
# integration test suite — see CONTEXT.md "Backend test pass" caveats.
#
# Lifecycle:
#   docker compose up -d postgres   # start the container (idempotent)
#   docker compose down             # stop + remove (data persists in the volume)
#   docker compose down -v          # wipe the volume too
#
# After first start, bootstrap the schema:
#   ./scripts/test-db-setup.sh
# or manually:
#   cd apps/api && NODE_ENV=test bun prisma db push --skip-generate
#   docker compose exec -T postgres psql -U castflow -d castflow_test < apps/api/prisma/post-push.sql

services:
  postgres:
    image: postgres:16-alpine
    container_name: castflow-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: castflow
      POSTGRES_PASSWORD: castflow_test
      POSTGRES_DB: castflow_test
    ports:
      - '5436:5432' # 5436 — host-port chosen to avoid existing Postgres on 5432-5435
    volumes:
      - castflow_test_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U castflow -d castflow_test']
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  castflow_test_pg:
